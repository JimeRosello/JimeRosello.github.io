<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8" />
    <title>Cayman National Home Banking</title>
    <link rel="icon" href="img/icon.png" type="image/png">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
        }

        header {
            background: white;
            padding: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        header img {
            max-width: 320px;
            display: block;
            margin: auto;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #003a8f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #002c6b;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
        }

        /* Footer */

        footer {
            background: white;
            border-top: 1px solid #e5e5e5;
            padding: 20px 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .footer-content {
            max-width: 1000px;
            margin: auto;
            text-align: center;
        }

        .footer-links {
            margin-bottom: 8px;
        }

        .footer-links a {
            color: #003a8f;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-copy {
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>

    <header>
        <img src="img/Cayman_National.png">
    </header>

    <div class="container">

        <div class="login-box">

            <h2>Sign in</h2>

            <form id="loginForm">

                <div class="input-group">
                    <label>Document number</label>
                    <input type="text" id="documentNumber">
                </div>

                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password">
                </div>

                <button type="submit">Sign in</button>

                <div id="message"></div>

            </form>

        </div>
    </div>

    <script>

        document.getElementById("loginForm").addEventListener("submit", function (e) {

            e.preventDefault();

            let doc = document.getElementById("documentNumber").value;
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            let message = document.getElementById("message");

            if (doc === "27120823" && user === "0UR_FU7UR3" && pass === "2810") {

                message.className = "success";
                message.innerText = "Access granted ✔";
                window.location.href = "dashboard.html";

            } else {

                message.className = "error";
                message.innerText = "Invalid credentials";

            }

        });

    </script>

    <footer>

        <div class="footer-content">

            <div class="footer-links">
                <a href="#">Security</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Use</a>
                <a href="#">Help</a>
            </div>

            <div class="footer-copy">
                © 2026 Cayman National Bank. All rights reserved.
            </div>

        </div>

    </footer>
</body>

</html>
